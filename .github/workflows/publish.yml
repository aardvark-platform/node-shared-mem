name: Publish

on:
  push:
    branches:
      - master
    tags:
      - 'v*'  # Trigger on version tags
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-latest]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install Dependencies & Compile Native Module
        run: npm ci

      - name: Test
        run: npm run test

      - name: Test (Electron)
        if: matrix.os != 'ubuntu-latest'
        run: npm run test:electron

      - name: Test (Electron using xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum npm run test:electron

  publish:
    name: Publish to npm
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') # Securely restrict to tags
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Mandatory for npm Trusted Publishing (OIDC)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Publish Package securely
        run: npm publish --provenance